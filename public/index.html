<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <!-- Dark, minimal screen while loading to reduce glare -->
    <style>
        body {
            margin: 0;
            background-color: #0b0f19;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script type="module">
        // Import Firebase libraries directly from CDN for minimal overhead
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // IMPORTANT: Replace these with actual project configuration when deploying
        const firebaseConfig = {
            apiKey: "REPLACE_ME",
            authDomain: "REPLACE_ME",
            projectId: "REPLACE_ME",
            storageBucket: "REPLACE_ME",
            messagingSenderId: "REPLACE_ME",
            appId: "REPLACE_ME"
        };
        
        // Target destination
        const TARGET_URL = "https://example.com/event";

        async function trackAndRedirect() {
            try {
                // Only initialize if config is valid to avoid crashing execution entirely
                if (firebaseConfig.projectId !== "REPLACE_ME") {
                    const app = initializeApp(firebaseConfig);
                    const db = getFirestore(app);
                    const statsRef = doc(db, 'stats', 'qr_scans');
                    // Atomically increment the scan counter
                    await updateDoc(statsRef, {
                        scans: increment(1)
                    });
                } else {
                    console.warn("Firebase not configured. Skipping scan count.");
                }
            } catch (error) {
                console.error("Error updating scan count:", error);
            } finally {
                // Ensure redirect always happens, even if the database increment fails
                window.location.href = TARGET_URL;
            }
        }

        // Execute as soon as the module loads
        trackAndRedirect();
    </script>
</body>
</html>
